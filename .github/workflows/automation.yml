name: Auto Merge

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches:
    - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Check if PR is mergeable
      id: check_mergeable
      run: |
        PR_STATE=$(curl -s \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}")

        MERGEABLE_STATE=$(echo "$PR_STATE" | jq -r '.mergeable_state')

        if [ "$MERGEABLE_STATE" != "clean" ]; then
          echo "PR is not mergeable. State: $MERGEABLE_STATE"
          exit 1
        else
          echo "PR is mergeable."
        fi

    - name: Auto Merge PR
      id: auto_merge
      uses: actions/github-script@v6
      with:
        script: |
          const { owner, repo } = context.repo;
          const pullRequestNumber = context.payload.pull_request.number;
          const pr = context.payload.pull_request;

          // Ensure the PR is mergeable and log the merge state
          if (pr.mergeable_state === 'clean') {
            console.log(`PR #${pullRequestNumber} is mergeable. Proceeding with merge.`);
            try {
              const mergeResponse = await github.pulls.merge({
                owner,
                repo,
                pull_number: pullRequestNumber,
                commit_title: `Merge PR #${pullRequestNumber}`,
                commit_message: `Merging PR #${pullRequestNumber} into main.`
              });
              console.log(`Merge successful: ${mergeResponse.data.sha}`);
            } catch (error) {
              console.error(`Error merging PR #${pullRequestNumber}: ${error.message}`);
              throw new Error("Merge failed");
            }
          } else {
            console.log(`Pull request #${pullRequestNumber} is not mergeable.`);
          }

    - name: Handle Merge Failure
      if: failure()
      run: |
        echo "Merge failed for PR #${{ github.event.pull_request.number }}. Please check the PR for conflicts or other issues."
